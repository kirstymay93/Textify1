name: Accessibility & Mobile Testing

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'  # Weekly at 2 AM UTC

jobs:
  a11y:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Check ARIA attributes
        run: |
          echo "ARIA Compliance Check"
          # This is a placeholder - integrate with axe-core or similar
          npm run test:a11y || true

  responsive:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Test responsive design
        run: |
          echo "Testing responsive breakpoints (mobile, tablet, desktop)"
          npm run test:responsive || true
