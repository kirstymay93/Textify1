name: Fix History

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix useProjectHistory
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("src/hooks/useProjectHistory.ts")

          s = p.read_text()

          s = s.replace(
              "snapshot-${Date.now()}",
              "snapshot-${Date.now()}-${Math.random().toString(36).slice(2,8)}"
          )

          s = s.replace(
              "setHistory([...history, snapshot])",
              "setHistory(prev => [snapshot, ...prev])"
          )

          p.write_text(s)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fix snapshot history" || exit 0
          git push